<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
</head>
<body>
    <!-- 체크박스, 라디오는 name, value 값을 꼭 넣어주고 name이 같으면 하나의 그룹 -->
     <!-- checked가 true이면 체크가 된다. -->
    <div>
        <label for="hobby1">등산</label>
            <input type="checkbox" name="hobby" value="등산" id="hobby1"> 
        
        <input type="checkbox" name="hobby" value="게임" checked="true"> 게임
        <input type="checkbox" name="hobby" value="영화보기"> 영화보기
    </div>
    <div>
        <input type="radio" name="gender" value="남자">남자 
        <input type="radio" name="gender" value="여자">여자
    </div>
</body>
</html>
