<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표</title>
    <style>
        table {
            width: 600px;
            border-collapse: collapse;

        }
        thead {
            background-color: deepskyblue;
            color: white;
        }
        tbody td { 
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tbody tr:hover {
            background-color: pink;
        }
    </style>
</head>

<body>
    <table border="1" width="50%">
        <tr>
            <td colspan="2">1</td>
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td rowspan="2">5</td>
            <td>6</td>
        </tr>
        <tr>

            <td>8</td>
        </tr>
    </table>
    <hr>
    <table>
        <thead>
            <tr>
                <th>이름</th>
                <th>과목</th>
                <th>점수</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">김사과</td>
                <td>HTML</td>
                <td>95</td>
            </tr>
            <tr>
                <td>CSS</td>
                <td>90</td>
            </tr>
            <tr>
                <td>반하나</td>
                <td>JavaScript</td>
                <td>88</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
