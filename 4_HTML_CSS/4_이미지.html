<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지</title>
</head>
<body>
    <!-- 
        웹에서 사용 가능한 이미지 포멧
        png, jpeg/jpg, gif, webp, svg 등등

        jpeg/jpg: 압축, 손실 알고리즘으로 만들어짐
        png: 투명도 R, G, B, A로 구성되어있음
        gif: 움직이는 사진, 여러개 사진사용
        webp: jpeg/jpg, png, gif 를 다 합쳐놓은거, 사용을 많이 안하는이유는 브라우저를 통해서 봐야함. 브라우저가 자꾸 바뀌면서 브라우저가 호환을 안하면 사용을 못함
        svg: 벡터로 만들어짐 아날로그로 되어있는, 함수로 되어있고, 코드로 변환 가능, 

    -->
    <!-- 절대 경로 -->
    <img src="C:\wooki\4_HTML_CSS\spring1.png" alt="봄">
    <!-- 웹 절대경로, 웹에 있는 이미지 주소 복사 -->
    <img src="https://tcpschool.com/img/logo.png" alt="로고">
    <img src="https://ssl.pstatic.net/melona/libs/1569/1569006/8a40cf5e7c7d93e046f3_20260609160020510.jpg" alt="봄">

    <!-- 상대 경로 -->
    <img src="spring1.png" alt="봄">
    <img src="images/spring2.png" alt="봄">

</body>
</html>
